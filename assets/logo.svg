<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="Litoral Adventure">
  <!-- ============================================================
       LOGO PLACEHOLDER · Litoral Adventure
       Reemplázalo por tu logo real: pega tu archivo como
       assets/logo.svg (o logo.png y cambia la ref en index.html).
       ============================================================ -->
  <defs>
    <linearGradient id="la-wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2bb6c4"/>
      <stop offset="1" stop-color="#0a6b8a"/>
    </linearGradient>
  </defs>
  <!-- emblema: ola + pingüino minimal -->
  <g transform="translate(4,8)">
    <circle cx="24" cy="24" r="24" fill="url(#la-wave)"/>
    <path d="M4 30 q10 -8 20 0 t20 0" fill="none" stroke="#eafaff" stroke-width="3" stroke-linecap="round"/>
    <path d="M4 38 q10 -8 20 0 t20 0" fill="none" stroke="#eafaff" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- pingüino -->
    <g transform="translate(18,6)">
      <ellipse cx="6" cy="10" rx="6" ry="9" fill="#0b2b33"/>
      <ellipse cx="6" cy="11" rx="3.2" ry="6.5" fill="#eafaff"/>
      <circle cx="6" cy="3.5" r="4" fill="#0b2b33"/>
      <circle cx="4.6" cy="3" r="0.9" fill="#eafaff"/>
      <path d="M6 4.5 l2.4 1.4 -2.4 1.1z" fill="#f2a71b"/>
    </g>
  </g>
  <!-- wordmark -->
  <g transform="translate(66,0)">
    <text x="0" y="30" font-family="'Poppins','Segoe UI',sans-serif" font-weight="700" font-size="22" fill="var(--la-ink,#0b2b33)">Litoral</text>
    <text x="0" y="52" font-family="'Poppins','Segoe UI',sans-serif" font-weight="600" font-size="18" letter-spacing="4" fill="#2bb6c4">ADVENTURE</text>
  </g>
</svg>
